version: "3.8"

services:
  app:
    build: .
    container_name: movie-rec-engine-app
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    command: ["sh", "-c", "python -m src.main && uvicorn src.api:app --host 0.0.0.0 --port 8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
